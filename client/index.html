<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,500;0,9..144,600;0,9..144,700;0,9..144,800;1,9..144,500;1,9..144,600;1,9..144,700&family=Outfit:wght@300;400;500;600;700;800;900&family=Instrument+Serif:ital@0;1&display=swap"
      rel="stylesheet"
    />
    <title>Bridge — skip the cold DM</title>
    <!-- Apply stored theme before first paint (avoids light flash; matches utils/appearance.js) -->
    <script>
      (function () {
        try {
          var raw = localStorage.getItem('bridge-appearance');
          if (!raw) return;
          var o = JSON.parse(raw);
          var pref = o && o.theme;
          var resolved = 'light';
          if (pref === 'dark') resolved = 'dark';
          else if (pref === 'system')
            resolved = window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
          var el = document.documentElement;
          el.classList.remove('theme-light', 'theme-dark');
          el.classList.add('theme-' + resolved);
          if (resolved === 'dark') el.classList.add('dark');
          else el.classList.remove('dark');
          if (o.high_contrast) el.classList.add('high-contrast');
          else el.classList.remove('high-contrast');
        } catch (e) {}
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
